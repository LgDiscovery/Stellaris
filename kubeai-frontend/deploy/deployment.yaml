apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeai-frontend
  namespace: kubeai
  labels:
    app: kubeai-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeai-frontend
  template:
    metadata:
      labels:
        app: kubeai-frontend
    spec:
      containers:
        - name: frontend
          image: kubeai-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            successThreshold: 1
            failureThreshold: 3
            timeoutSeconds: 5
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d
      volumes:
        - name: nginx-config
          configMap:
            name: kubeai-frontend-nginx
